<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden}
.ad{width:1080px;height:1080px;position:relative;font-family:'DM Sans',sans-serif}
.bg{position:absolute;inset:0}
.bg img{width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.25) 0%,rgba(0,0,0,.1) 35%,rgba(0,0,0,.7) 65%,rgba(0,0,0,.95) 100%)}
.c{position:absolute;inset:0;padding:60px;display:flex;flex-direction:column;justify-content:space-between}
.logo{font-family:'Playfair Display',serif;font-size:30px;color:#fff;font-weight:700;letter-spacing:.02em}
.logo span{color:#c8a96e}
.mid{display:flex;flex-direction:column;align-items:center;gap:16px}
.tag{background:rgba(200,169,110,.15);border:1.5px solid #c8a96e;padding:10px 24px;font-size:14px;letter-spacing:.22em;text-transform:uppercase;color:#c8a96e;font-weight:600}
.screens{display:flex;align-items:flex-end;justify-content:center;gap:16px}
.desktop{width:520px;background:rgba(8,8,8,.88);border-radius:7px 7px 0 0;border:.5px solid rgba(200,169,110,.3);overflow:hidden}
.desktop-bar{background:#1a1a1a;padding:8px 12px;display:flex;gap:5px}
.dot{width:9px;height:9px;border-radius:50%}
.desktop-screen{height:200px;overflow:hidden}
.desktop-screen img{width:100%;height:100%;object-fit:cover;display:block}
.desktop-nav{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:.5px solid rgba(200,169,110,.1);background:#0a0a0a}
.desktop-nav-logo{font-family:'Playfair Display',serif;font-size:11px;color:#f5f2ee}
.desktop-nav-links{display:flex;gap:12px}
.desktop-nav-links span{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.desktop-nav-links span.a{color:#c8a96e}
.phone{width:160px;background:rgba(8,8,8,.88);border-radius:16px;border:.5px solid rgba(200,169,110,.3);overflow:hidden}
.phone-notch{background:#050505;height:16px;display:flex;align-items:center;justify-content:center}
.phone-pill{width:28px;height:3px;background:#222;border-radius:2px}
.phone-screen{height:200px;overflow:hidden}
.phone-screen img{width:100%;height:100%;object-fit:cover;display:block}
.phone-nav{padding:6px 10px;border-bottom:.5px solid rgba(200,169,110,.1);background:#0a0a0a}
.phone-nav-logo{font-family:'Playfair Display',serif;font-size:9px;color:#f5f2ee}
.bottom{}
.headline{font-family:'Playfair Display',serif;font-size:76px;font-weight:700;color:#fff;line-height:1.0;margin-bottom:10px}
.headline em{color:#c8a96e;font-style:italic;font-weight:400}
.sub{font-size:20px;color:rgba(255,255,255,.55);margin-bottom:28px;letter-spacing:.02em}
.offer-row{display:flex;align-items:center;justify-content:space-between}
.offer-left{display:flex;align-items:baseline;gap:14px}
.price{font-family:'Playfair Display',serif;font-size:72px;color:#c8a96e;line-height:1;font-weight:700}
.price-detail{display:flex;flex-direction:column;gap:2px}
.price-old{font-size:18px;color:rgba(255,255,255,.3);text-decoration:line-through}
.price-sub{font-size:16px;color:rgba(255,255,255,.45)}
.cta{background:#c8a96e;color:#000;font-size:20px;font-weight:700;padding:20px 36px;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.cta::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:sh 2s infinite}
@keyframes sh{to{left:150%}}
.cta svg{width:22px;height:22px;fill:#000}
</style>
</head>
<body>
<div class="ad">
  <div class="bg"><img src="https://res.cloudinary.com/doxsjisyx/image/upload/c_fill,q_90/photos-du-monde/w_1080,h_1080/tgyzt5eagy4irx0m9wa1.jpg"></div>
  <div class="overlay"></div>
  <div class="c">
    <div class="logo">Marcopolo<span>.</span>Studio</div>
    <div class="mid">
      <div class="tag">Offre d'été — Places limitées</div>
      <div class="screens">
        <div class="desktop">
          <div class="desktop-bar"><div class="dot" style="background:#ff5f57"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c840"></div></div>
          <div class="desktop-nav"><div class="desktop-nav-logo">PHOTOS DU MONDE</div><div class="desktop-nav-links"><span class="a">Accueil</span><span>Destinations</span><span>Galerie</span></div></div>
          <div class="desktop-screen"><img src="https://res.cloudinary.com/doxsjisyx/image/upload/c_fill,q_90/photos-du-monde/w_600,h_220/exdfmmd9bs2trqfctofs.jpg"></div>
        </div>
        <div class="phone">
          <div class="phone-notch"><div class="phone-pill"></div></div>
          <div class="phone-nav"><div class="phone-nav-logo">PHOTOS DU MONDE</div></div>
          <div class="phone-screen"><img src="https://res.cloudinary.com/doxsjisyx/image/upload/c_fill,q_90/photos-du-monde/w_200,h_220/ermulsnbyye2vqn76i1l.jpg"></div>
        </div>
      </div>
    </div>
    <div class="bottom">
      <div class="headline">Votre site pro,<br><em>livré en 7 jours.</em></div>
      <div class="sub">Artisans · Commerçants · Passionnés de photo, sport, musique...</div>
      <div class="offer-row">
        <div class="offer-left">
          <div class="price">500.-</div>
          <div class="price-detail">
            <div class="price-old">Au lieu de 1200.-</div>
            <div class="price-sub">+ 50.- / mois tout inclus</div>
          </div>
        </div>
        <div class="cta">
          <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsApp →
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
